    kind: ValkeyCluster
    listKind: ValkeyClusterList
    plural: valkeyclusters
    shortNames:
    - vc
    - vk
    singular: valkeycluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
